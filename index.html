<!DOCTYPE html>
<html lang="en">

<head>
  <title>AI object detection</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <!-- ONNX Runtime Web for YOLOv8 -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>

<body>
  <h2 id="loadingText">Loading...</h2>
  <!-- video with size of 0px because of chrome -->
  <video playsinline autoplay muted controls="true" id="video"></video>
  <br><br>
  <canvas id="c1"></canvas>
  <br><br>
  <table>
    <tr>
      <td>AI:</td>
      <td>
        <div class="switch">
          <label>
            Off
            <input type="checkbox" id="ai" disabled>
            <span class="lever"></span>
            On
          </label>
        </div>
      </td>
    </tr>
    <tr>
      <td>FPS:</td>
      <td>
        <p class="range-field">
          <input type="range" id="fps" min="1" max="60" value="50">
        </p>
      </td>
    </tr>
    <tr>
      <td>Detection Model:</td>
      <td>
        <select id="modelSelect" class="browser-default">
          <option value="cocossd">COCO-SSD (ML5)</option>
          <option value="yolo-coco">YOLO (TensorFlow)</option>
          <option value="yolov8">YOLOv8 (ONNX)</option>
        </select>
      </td>
    </tr>
    <tr>
      <td>Confidence:</td>
      <td>
        <p class="range-field">
          <input type="range" id="confidence" min="0.1" max="1" step="0.1" value="0.5">
          <span id="confidenceValue">0.5</span>
        </p>
      </td>
    </tr>
  </table>

  <script>
    var modelIsLoaded = false;
    var currentModel = 'cocossd';
    var cocoSsdDetector = null;
    var yoloDetector = null;
    var yolov8Detector = null;
    var yolov8Session = null;

    // Class names for YOLOv8 (COCO dataset)
    const YOLOV8_CLASSES = [
      'person', 'bicycle', 'car', 'motorcycle', 'airplane', 'bus', 'train', 'truck', 
      'boat', 'traffic light', 'fire hydrant', 'stop sign', 'parking meter', 'bench', 
      'cat', 'dog', 'horse', 'sheep', 'cow', 'elephant', 'bear', 'zebra', 'giraffe', 
      'backpack', 'umbrella', 'handbag', 'tie', 'suitcase', 'frisbee', 'skis', 'snowboard', 
      'sports ball', 'kite', 'baseball bat', 'baseball glove', 'skateboard', 'surfboard', 
      'tennis racket', 'bottle', 'wine glass', 'cup', 'fork', 'knife', 'spoon', 'bowl', 
      'banana', 'apple', 'sandwich', 'orange', 'broccoli', 'carrot', 'hot dog', 'pizza', 
      'donut', 'cake', 'chair', 'couch', 'potted plant', 'bed', 'dining table', 'toilet', 
      'tv', 'laptop', 'mouse', 'remote', 'keyboard', 'microwave', 'oven', 'toaster', 
      'sink', 'refrigerator', 'book', 'clock', 'vase', 'scissors', 'teddy bear', 'hair drier', 
      'toothbrush'
    ];

    // Load COCO-SSD model initially
    const objectDetector = ml5.objectDetector('cocossd', {}, modelLoaded);

    // Load YOLO model
    async function loadYoloModel() {
      console.log("Loading YOLO model...");
      yoloDetector = await cocoSsd.load();
      console.log("YOLO Model Loaded!");
    }

    // Load YOLOv8 model
    async function loadYolov8Model() {
      try {
        console.log("Loading YOLOv8 model...");
        // Using a YOLOv8n (nano) model converted to ONNX format from Ultralytics
        const modelUrl = 'https://raw.githubusercontent.com/ultralytics/assets/main/yolov8n.onnx';
        
        yolov8Session = await ort.InferenceSession.create(modelUrl, {
          executionProviders: ['webgl', 'wasm'],
          graphOptimizationLevel: 'all'
        });
        
        console.log("YOLOv8 Model Loaded Successfully!");
      } catch (error) {
        console.error("Error loading YOLOv8 model:", error);
        console.log("Falling back to COCO-SSD. YOLOv8 requires valid ONNX model file.");
      }
    }

    // When the models are loaded
    function modelLoaded() {
      console.log("COCO-SSD Model Loaded!");
      cocoSsdDetector = objectDetector;
      loadYoloModel();
      loadYolov8Model();
      modelIsLoaded = true;
    }

    // Model selector
    document.getElementById("modelSelect").addEventListener("change", function(e) {
      currentModel = e.target.value;
      console.log("Switched to model: " + currentModel);
      if (currentModel === 'yolov8' && !yolov8Session) {
        console.warn("YOLOv8 model not loaded yet. Loading now...");
        loadYolov8Model();
      }
    });

    // Confidence slider
    document.getElementById("confidence").addEventListener("input", function(e) {
      document.getElementById("confidenceValue").innerText = e.target.value;
    });
  </script>
  <script src="video.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>

</html>
